# =============================================================================
# health-check.yml — external uptime watchdog for sentry.sarvesh.yral.com
# =============================================================================
#
# WHAT THIS WORKFLOW DOES:
#   Every 5 minutes, curl https://sentry.sarvesh.yral.com/_health/ and fail the
#   GitHub Actions run if the HTTP status code is not 200. A failed run sends
#   an email to everyone watching this repo (default GitHub behaviour for
#   `schedule`-triggered failures).
#
# WHY AN EXTERNAL WATCHDOG:
#   Sentry's own error reporting can't tell you when Sentry itself is down
#   — that's the classic "who watches the watcher" problem. This workflow
#   runs on GitHub's shared infra (independent of our sarvesh-* cluster), so a
#   cluster-wide outage is detected immediately rather than when someone
#   happens to open the UI.
#
#   This covers:
#     - sarvesh-1 and sarvesh-2 both down (Cloudflare returns 522)
#     - sarvesh-3 down (Caddy → sarvesh-3 times out)
#     - Caddy not attached to sentry-web overlay (502 from Caddy)
#     - Sentry web container crashed (Caddy reaches nginx but nginx can't
#       reach the Django app; gives 502)
#     - Kafka/Clickhouse/Postgres critical failure (web reports unhealthy)
#
# WHAT IT DOES NOT COVER:
#   - Events being accepted by ingest but not flowing through to UI (lag).
#     That's a separate Discover query that should eventually become
#     another workflow; see Phase 9 TODO in RUNBOOK.
#   - Google OAuth misconfiguration (the watchdog uses direct HTTP,
#     bypassing SSO).
#
# CADENCE:
#   Every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC) — 6 runs
#   per day. Originally `*/5 * * * *` (every 5 min, 288 runs/day) but that
#   was too aggressive for our scale + amplified email noise from transient
#   Cloudflare-edge flakiness in 2026-04. At 4-hour cadence the worst-case
#   detection delay for a true outage is 4 hours, which matches how quickly
#   we'd actually respond out-of-hours anyway.
#
#   Also manually-triggerable via `workflow_dispatch` for ad-hoc checks.
# =============================================================================

name: Sentry health check

on:
  schedule:
    # cron format: "minute hour day month weekday" — UTC.
    # 0 */4 * * *  → at minute 0 of every 4th hour: 00, 04, 08, 12, 16, 20.
    - cron: '0 */4 * * *'
  # Allow manual "run now" from the Actions tab or via `gh workflow run`.
  workflow_dispatch:

# Cancel any in-progress run if a new one starts. Prevents pile-up if a
# single run hangs.
concurrency:
  group: sentry-health-check
  cancel-in-progress: true

jobs:
  check:
    name: curl /_health/
    runs-on: ubuntu-latest
    # 30 second hard cap. Normal response is <1 s. If we're waiting >30 s
    # something is truly wedged and we want the loud alarm now.
    timeout-minutes: 1

    steps:
      - name: Curl Sentry health endpoint (3 retries, 20 s backoff)
        env:
          # Single source of truth for the URL we're probing. If the URL
          # changes, update here AND in project.config's PROJECT_DOMAIN.
          SENTRY_URL: https://sentry.sarvesh.yral.com/_health/
        run: |
          set -uo pipefail
          # WHY 3 ATTEMPTS WITH BACKOFF:
          # Cloudflare's edge ↔ origin pull is occasionally flaky from the
          # GitHub-runner's region (observed cluster of 9 false-failure
          # alerts on 2026-04-26 while origin was perfectly healthy the
          # whole time). A single transient curl timeout is NOT a real
          # outage; we only declare failure if 3 spaced attempts all fail.
          # This eliminates the email noise without missing a real outage
          # — Sentry being down for 50+ seconds (3 × 10s timeout + 2 × 20s
          # backoff) is still well within our 4-hour worst-case detection.
          ATTEMPTS=3
          BACKOFF=20
          for i in $(seq 1 $ATTEMPTS); do
            STATUS=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" "$SENTRY_URL" 2>/dev/null || echo "000")
            echo "attempt $i/$ATTEMPTS: GET $SENTRY_URL → $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Sentry is healthy."
              exit 0
            fi
            if [[ "$i" -lt "$ATTEMPTS" ]]; then
              echo "  (sleeping ${BACKOFF}s before retry)"
              sleep "$BACKOFF"
            fi
          done

          # All attempts failed — surface as a CI annotation + email.
          echo "::error title=Sentry is unhealthy::All $ATTEMPTS probes to $SENTRY_URL failed (last status: $STATUS)"
          exit 1

  # ==========================================================================
  # cpu-pressure — detects when sarvesh-3 is under sustained load
  # ==========================================================================
  # This is the "early-warning" counterpart to the binary up/down check above.
  # Beszel alerts us at ~90 % CPU; this workflow catches drift earlier so we
  # can tune sampling / retention / etc. before the host is actually slow.
  #
  # Threshold: 5-minute load average > 12 on an 8-core host = ~1.5× core
  # count sustained. Normal operation post-2026-04-22-tuning sits under 4.
  # A single sustained threshold breach emails whoever watches this repo.
  #
  # Uses the same HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY secret
  # the backup workflow uses — same CI key, same access scope.
  # ==========================================================================
  cpu-pressure:
    name: sarvesh-3 load avg watchdog
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      id-token: write
    env:
      SENTRY_HOST: 138.201.57.116
      # 5-min load avg threshold. Chosen as 1.5× core count (8 cores).
      # Anything sustained above this means CPU is saturated longer than
      # bursty tasks should take.
      LOAD_THRESHOLD: '12'

    steps:
      - name: Import SSH key from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-sarvesh-sentry-role
          jwtGithubAudience: https://github.com/dolr-ai
          secrets: |
            secret/data/yral-sarvesh-sentry/MACHINE_ACCESS_PRIVATE_KEY value | MACHINE_ACCESS_PRIVATE_KEY ;
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.MACHINE_ACCESS_PRIVATE_KEY }}" > ~/.ssh/sarvesh_ci_key
          chmod 600 ~/.ssh/sarvesh_ci_key
          ssh-keyscan -H "$SENTRY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Read /proc/loadavg over SSH and compare to threshold
        run: |
          set -euo pipefail
          # /proc/loadavg format: "1min 5min 15min runnable/total lastpid"
          # Column 2 is the 5-min load avg — the one we care about.
          LOAD5=$(ssh -o BatchMode=yes -i ~/.ssh/sarvesh_ci_key "deploy@${SENTRY_HOST}" "awk '{print \$2}' /proc/loadavg")
          echo "sarvesh-3 5-min load avg: $LOAD5 (threshold: $LOAD_THRESHOLD)"

          # bash doesn't compare floats natively; pipe through awk.
          EXCEEDED=$(awk -v l="$LOAD5" -v t="$LOAD_THRESHOLD" 'BEGIN { print (l > t) ? "yes" : "no" }')
          if [[ "$EXCEEDED" == "yes" ]]; then
            echo "::error title=sarvesh-3 CPU pressure::5-min load avg $LOAD5 exceeds threshold $LOAD_THRESHOLD on 8-core sarvesh-3"
            exit 1
          fi

          echo "sarvesh-3 load is within threshold."
