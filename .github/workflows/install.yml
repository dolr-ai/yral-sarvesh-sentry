name: Install or upgrade Sentry

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    env:
      SARVESH_1_HOST_IP: ${{ secrets.SARVESH_1_HOST_IP }}
      SARVESH_2_HOST_IP: ${{ secrets.SARVESH_2_HOST_IP }}
      SARVESH_3_HOST_IP: ${{ secrets.SARVESH_3_HOST_IP }}
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MACHINE_ACCESS_PRIVATE_KEY }}

      - name: Trust fleet hosts
        run: |
          ssh-keyscan -H "$SARVESH_1_HOST_IP" "$SARVESH_2_HOST_IP" "$SARVESH_3_HOST_IP" >> ~/.ssh/known_hosts

      - name: Copy installer to sarvesh-3
        run: |
          ssh yral-deploy@${SARVESH_3_HOST_IP} 'mkdir -p /home/yral-deploy/yral-sarvesh-sentry'
          rsync -az --delete --exclude .git ./ yral-deploy@${SARVESH_3_HOST_IP}:/home/yral-deploy/yral-sarvesh-sentry/

      - name: Install Sentry on sarvesh-3
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          ssh yral-deploy@${SARVESH_3_HOST_IP} "cd /home/yral-deploy/yral-sarvesh-sentry && GOOGLE_CLIENT_ID='${GOOGLE_CLIENT_ID}' GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}' bash scripts/install.sh"

      - name: Install Caddy route on fleet hosts
        run: |
          for host in "$SARVESH_1_HOST_IP" "$SARVESH_2_HOST_IP"; do
            ssh yral-deploy@$host "SENTRY_UPSTREAM_IP='${SARVESH_3_HOST_IP}' bash -s" <<'SCRIPT'
          set -euo pipefail

          caddyfile=/opt/hello-world/Caddyfile
          container=hello-world-proxy-1

          test -w "$caddyfile"

          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("/opt/hello-world/Caddyfile")
          upstream = os.environ["SENTRY_UPSTREAM_IP"]
          lines = path.read_text().splitlines()
          output = []
          i = 0

          while i < len(lines):
              if lines[i].strip() == "sentry.sarvesh.yral.com:443 {":
                  depth = 0
                  while i < len(lines):
                      depth += lines[i].count("{") - lines[i].count("}")
                      i += 1
                      if depth <= 0:
                          break
                  while output and output[-1].strip() == "":
                      output.pop()
                  continue

              output.append(lines[i])
              i += 1

          while output and output[-1].strip() == "":
              output.pop()

          output.extend([
              "",
              "sentry.sarvesh.yral.com:443 {",
              "    tls /etc/caddy/certs/fullchain.pem /etc/caddy/certs/privkey.pem",
              f"    reverse_proxy {upstream}:9000",
              "}",
          ])

          path.write_text("\n".join(output) + "\n")
          PY

          docker restart "$container"
          docker exec "$container" caddy validate --config /etc/caddy/Caddyfile
          SCRIPT
          done

      - name: Verify public health
        run: curl --fail --retry 12 --retry-delay 10 https://sentry.sarvesh.yral.com/_health/
