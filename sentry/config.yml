# =============================================================================
# yral-sarvesh-sentry — Sentry application config overrides
# =============================================================================
#
# This file replaces the upstream `sentry/config.example.yml` INSIDE the
# cloned `/opt/sentry-upstream/sentry/` directory on sarvesh-3. Upstream's
# install.sh copies `config.example.yml` → `config.yml` only IF `config.yml`
# doesn't already exist, so by placing our version first we lock in our
# settings.
#
# WHY a separate file (not .env)? Sentry has two configuration layers:
#   1. YAML config (this file): high-level app settings that Sentry's Django
#      code reads. Things like mail, URL prefix, SSO client IDs.
#   2. Python config (sentry.conf.py): advanced settings, overrides, and
#      anything that needs actual Python logic. Things like SSO domain
#      whitelist lambdas, middleware, cache backends.
# Anything that fits in YAML belongs here. Anything that needs Python
# (like our `GOOGLE_DOMAIN_WHITELIST = ['gobazzinga.io']` line) goes in
# `sentry.conf.override.py` which we append to upstream's sentry.conf.py.
#
# WHY do values reference $ENV_VAR? Sentry interpolates env vars in this
# YAML file at runtime. Our Google OAuth client ID + secret come from a
# `.env.custom` file on sarvesh-3 which is populated from GitHub Secrets
# at deploy time — NEVER checked in to git. See scripts/install.sh for
# how `.env.custom` gets populated.
#
# SAFETY: this file is committed to git. No secrets allowed. Every secret
# referenced here MUST use the `$VAR` syntax pointing at an env var that is
# populated from `.env.custom` on sarvesh-3.
# =============================================================================

###################
# System Settings #
###################

# This is the public URL Sentry will use to generate links in emails, API
# responses, and the UI itself. MUST match the Caddy-terminated domain from
# Phase 3 of the rollout plan. Changing this later requires restarting all
# containers and triggers a full URL-rewrite across existing events.
system.url-prefix: 'https://sentry.sarvesh.yral.com'

# Internal URL for container-to-container HTTP calls. `web` is the service
# name in docker-compose.yml; 9000 is Sentry's default internal port. We
# do NOT change this — it's only referenced inside the docker network and
# has nothing to do with what users see.
system.internal-url-prefix: 'http://web:9000'

# The system secret key is auto-generated by upstream install.sh into the
# `.env` file as `SENTRY_SYSTEM_SECRET_KEY`. The commented line below is
# what upstream's example ships with — we explicitly DO NOT set it here so
# the env-var value from install-time generation wins.
# system.secret-key: '!!changeme!!'

# system.admin-email — intentionally NOT set here.
# auth.allow-registration — intentionally NOT set here.
# beacon.anonymous — intentionally NOT set here (see below in Beacon section).
#
# WHY: Sentry's first-time setup wizard (shown to a freshly-installed
# instance at /organizations/sentry/auth/ "Welcome to Sentry") collects
# exactly these three settings and writes them to the DB options store
# via PUT /api/0/internal/options/?query=is:required. If they're pinned
# in this file, that API call returns 400 ("this option is set via
# config file, cannot be modified") and the wizard never completes.
#
# The values to enter when the wizard runs:
#   Admin Email:             sarvesh@gobazzinga.io
#   Allow Registration:      off (do NOT tick)
#   Beacon / Usage Stats:    "Please keep my usage information anonymous"
#   CPU/RAM usage:           "No, I would prefer to keep CPU/RAM usage private"
#
# Once the wizard is complete these live in Sentry's DB options store
# and are editable via the superuser admin panel. config.yml re-pinning
# after-the-fact would re-break the same API, so we intentionally keep
# them out of this file permanently.

#################
# Google OAuth  #
#################
#
# Intentionally NOT set here. Sentry's config.yml parser does NOT
# perform environment variable interpolation — a value like
# `$GOOGLE_CLIENT_ID` is stored as the literal five-character string
# `$GOOG...` and OAuth silently fails. That was a multi-hour dead-end
# in Phase 4 of the rollout before we realised.
#
# Instead, auth-google.client-id and auth-google.client-secret are set
# from `os.environ` inside `sentry/sentry.conf.override.py`, which is
# Python code and DOES read env vars properly.
#
# The env vars themselves (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET) flow:
#   GitHub Secrets / user's shell
#     → scripts/install.sh
#       → .env.custom on sarvesh-3
#         → docker-compose.override.yml forwards them to the web service
#           → Python env of the Sentry web process
#             → os.environ.get() in sentry.conf.override.py
#               → SENTRY_OPTIONS["auth-google.client-id"] (the real setting)

###############
# Mail Server #
###############
#
# Email alerts are OFF for the initial rollout. We route all alerts
# through the Sentry UI + the per-project "send email on new issue" rule
# configured in Phase 5. If we later add an SMTP relay (open question
# carried to Phase 9), uncomment and fill these in.
#
# mail.backend: 'smtp'
# mail.host: 'smtp.example.com'
# mail.port: 587
# mail.username: ''
# mail.password: '$SMTP_PASSWORD'
# mail.use-tls: true
# mail.from: 'sentry@gobazzinga.io'

# Until SMTP is configured, use the `dummy` backend. Sentry will log
# emails it would have sent to the container's stdout instead of
# attempting to deliver — nothing crashes, we just don't get emails.
mail.backend: 'dummy'

###################
# GitHub (future) #
###################
#
# Not used in Phase 1–10 of the rollout. If we later want to auto-link
# Sentry issues to GitHub issues on dolr-ai/*, we'd create a GitHub App
# and fill these in. Leaving stubs here so a future-Sarvesh knows where.
#
# github-app.id: ''
# github-app.name: ''
# github-app.webhook-secret: '$GITHUB_WEBHOOK_SECRET'
# github-app.client-id: '$GITHUB_CLIENT_ID'
# github-app.client-secret: '$GITHUB_CLIENT_SECRET'
# github-app.private-key: ''

#################
# Beacon        #
#################
#
# beacon.anonymous — intentionally NOT set here.
# Same reason as system.admin-email / auth.allow-registration above:
# this value is collected by the first-time setup wizard, and pinning
# it in config.yml causes the wizard save to 400. The wizard writes
# the value to the DB options store instead.
#
# Recommended answer in the wizard:
#   "Please keep my usage information anonymous"
#   "No, I would prefer to keep CPU/RAM usage private"

#################
# File storage  #
#################
#
# Sentry stores source maps, minidumps, and artifact bundles. Upstream
# default is to use a local filesystem backend which is a volume on
# sarvesh-3. That's fine for our traffic level. If we later want to move
# these to Hetzner Object Storage (same bucket as DB backups), we'd
# set `filestore.backend: 's3'` here.

filestore.backend: 'filesystem'
filestore.options:
  location: '/data/files'
